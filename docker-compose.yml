services:
  neo4j:
    image: neo4j:5.18
    container_name: hpe_neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/hpe_san_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: hpe_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # Node.js Chatbot Service (Auth + Gemini)
  chatbot:
    build:
      context: .
      dockerfile: chatbot-service/Dockerfile
    container_name: hpe_chatbot
    ports:
      - "5010:5010"
    environment:
      MONGO_URI: ${MONGO_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: hpe_san_password
      CHATBOT_PORT: 5010
    restart: unless-stopped

  # Local MongoDB Fallback
  mongo:
    image: mongo:latest
    container_name: hpe_mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb_data:/data/db
    restart: unless-stopped

  # Unified Flask API (Serves Dashboard + Discovery + Proxy to Chatbot)
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: hpe_san_api
    ports:
      - "5005:5005"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: hpe_san_password
      GROQ_API_KEY: ${GROQ_API_KEY}
      CHATBOT_SERVICE_URL: http://chatbot:5010
      ES_HOST: http://elasticsearch:9200
    depends_on:
      - neo4j
      - elasticsearch
      - chatbot
    restart: unless-stopped
