version: "3.9"

services:
  neo4j:
    image: neo4j:5.18
    container_name: hpe_neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/hpe_san_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: hpe_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: hpe_kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # Optional: unified Flask API (sim proxy expects simulator on host network — for full stack run API on host via RUN_GUIDE)
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: hpe_san_api
    ports:
      - "5005:5005"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: hpe_san_password
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      - neo4j
      - elasticsearch
    restart: unless-stopped
